name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, e.g. 0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            ort_archive_arch: osx-arm64

          - target: x86_64-apple-darwin
            runner: macos-15-intel
            ort_archive_arch: osx-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install ONNX Runtime
        shell: bash
        run: |
          ORT_VERSION="1.25.0"
          ORT_ARCHIVE="onnxruntime-${{ matrix.ort_archive_arch }}-${ORT_VERSION}.tgz"

          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            ORT_URL="https://github.com/alexdovzhanyn/substrate/releases/download/0.1.1/onnxruntime-osx-x64-1.25.0.tgz"
          else
            ORT_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ORT_ARCHIVE}"
          fi

          mkdir -p vendor/onnxruntime

          echo "Downloading ${ORT_URL}"
          curl -fL "$ORT_URL" -o "$ORT_ARCHIVE"

          tar -xzf "$ORT_ARCHIVE" -C vendor/onnxruntime --strip-components=1

          ln -sf "libonnxruntime.${ORT_VERSION}.dylib" \
            vendor/onnxruntime/lib/libonnxruntime.dylib

          echo "ORT_VERSION=$ORT_VERSION" >> "$GITHUB_ENV"
          echo "ORT_DYLIB_PATH=$PWD/vendor/onnxruntime/lib/libonnxruntime.dylib" >> "$GITHUB_ENV"

          ls -lh vendor/onnxruntime/lib
          file vendor/onnxruntime/lib/libonnxruntime.${ORT_VERSION}.dylib

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci --include=optional

      - name: Build web app
        run: npm --prefix web run build

      - name: Install Hugging Face CLI
        run: brew install huggingface-cli

      - name: Download models
        run: |
          mkdir -p models

          hf download BAAI/bge-small-en-v1.5 \
            --local-dir models/bge-small-en-v1.5 \
            --exclude "*.safetensors" "pytorch_model.bin"

          hf download BAAI/bge-reranker-base \
            --local-dir models/bge-reranker-base \
            --exclude "*.safetensors" "pytorch_model.bin"

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --target ${{ matrix.target }} --all-targets --all-features

      - name: Run Rust tests
        run: SUBSTRATE_HOME="$PWD" cargo test --target ${{ matrix.target }} --all-features

      - name: Build Rust release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          TARGET="${{ matrix.target }}"
          PROFILE_DIR="release"
          BINARY_NAME="substrate"

          DIST_ROOT="dist"
          PACKAGE_NAME="substrate-v${VERSION}-${TARGET}"
          PACKAGE_DIR="$DIST_ROOT/$PACKAGE_NAME"

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"

          cp "target/$TARGET/$PROFILE_DIR/$BINARY_NAME" "$PACKAGE_DIR/$BINARY_NAME"

          mkdir -p "$PACKAGE_DIR/models"
          rsync -a --delete \
            --exclude='*.safetensors' \
            --exclude='pytorch_model.bin' \
            models/ "$PACKAGE_DIR/models/"

          mkdir -p "$PACKAGE_DIR/web"
          rsync -a --delete web/dist/ "$PACKAGE_DIR/web/"

          mkdir -p "$PACKAGE_DIR/vendor"
          rsync -a --delete vendor/onnxruntime/ "$PACKAGE_DIR/vendor/onnxruntime/"

          if [ -f README.md ]; then
            cp README.md "$PACKAGE_DIR/README.md"
          fi

          if [ -f LICENSE.md ]; then
            cp LICENSE.md "$PACKAGE_DIR/LICENSE.md"
          fi

          tar -czf "$DIST_ROOT/$PACKAGE_NAME.tar.gz" -C "$DIST_ROOT" "$PACKAGE_NAME"
          shasum -a 256 "$DIST_ROOT/$PACKAGE_NAME.tar.gz" > "$DIST_ROOT/$PACKAGE_NAME.tar.gz.sha256"

          ls -lh "$DIST_ROOT"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Substrate v${{ inputs.version }}
          draft: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
