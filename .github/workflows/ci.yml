name: CI

"on":
  push:
    branches:
      - master

jobs:
  build:
    name: Build and test
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Install ONNX Runtime
        shell: bash
        run: |
          ORT_VERSION="1.25.0"
          ORT_ARCHIVE="onnxruntime-osx-arm64-${ORT_VERSION}.tgz"
          ORT_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ORT_ARCHIVE}"

          mkdir -p vendor/onnxruntime

          echo "Downloading ${ORT_URL}"
          curl -fL "$ORT_URL" -o "$ORT_ARCHIVE"

          tar -xzf "$ORT_ARCHIVE" -C vendor/onnxruntime --strip-components=1

          ln -sf "libonnxruntime.${ORT_VERSION}.dylib" \
            vendor/onnxruntime/lib/libonnxruntime.dylib

          echo "ORT_DYLIB_PATH=$PWD/vendor/onnxruntime/lib/libonnxruntime.dylib" >> "$GITHUB_ENV"

          ls -lh vendor/onnxruntime/lib
          file vendor/onnxruntime/lib/libonnxruntime.${ORT_VERSION}.dylib

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci --include=optional

      - name: Build web app
        run: npm --prefix web run build

      - name: Install Hugging Face CLI
        run: brew install huggingface-cli

      - name: Download models
        run: |
          mkdir -p models

          hf download BAAI/bge-small-en-v1.5 \
            --local-dir models/bge-small-en-v1.5 \
            --exclude "*.safetensors" \
            --exclude "pytorch_model.bin"

          hf download BAAI/bge-reranker-base \
            --local-dir models/bge-reranker-base \
            --exclude "*.safetensors" \
            --exclude "pytorch_model.bin"

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

      - name: Run Rust tests
        run: SUBSTRATE_HOME="$PWD" cargo test --all-features

      - name: Build Rust binary
        run: cargo build
